<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WS Display · Time Clock</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0f1e3d; --navy2:#1b3a6b; --accent:#3b82f6; --bg:#eef1f7; --card:#fff; --line:#e5e9f2;
  --ink:#0f1e3d; --muted:#6b7896; --ok:#16a34a; --okbg:#dcfce7; --warn:#d97706; --warnbg:#fef3c7;
  --bad:#dc2626; --badbg:#fee2e2; --grad:linear-gradient(135deg,#0f1e3d 0%,#1b3a6b 55%,#2563eb 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none}
input,select{font-family:inherit;font-size:15px}
.app{max-width:460px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative}

/* Login (kiosk keypad) */
.login{min-height:100vh;min-height:100dvh;background:radial-gradient(120% 90% at 25% 15%, #244a86 0%, #12274d 45%, #0a1530 100%);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.login-glow{pointer-events:none;position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,#3b82f6,transparent 68%);opacity:.4;top:-70px;right:-70px;filter:blur(24px);animation:float 9s ease-in-out infinite}
.login-glow.b{background:radial-gradient(circle,#60a5fa,transparent 68%);opacity:.22;bottom:-90px;left:-70px;top:auto;right:auto;animation-delay:-4s}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(-16px,20px)}}
.login-top{text-align:center;margin-bottom:20px;z-index:1}
.login-logo{width:56px;height:56px;border-radius:17px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:29px;margin:0 auto 10px;backdrop-filter:blur(6px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.login-brand{font-size:13px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;opacity:.8}
.login-clock{font-size:32px;font-weight:700;margin-top:8px;font-variant-numeric:tabular-nums;line-height:1}
.login-date{font-size:12.5px;opacity:.65;margin-top:2px}
.login-card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:26px;padding:22px 20px;width:100%;max-width:330px;backdrop-filter:blur(14px);z-index:1;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.login-title{font-size:19px;font-weight:700;text-align:center}
.login-sub{font-size:12.5px;opacity:.7;text-align:center;margin:3px 0 18px}
.id-display{display:flex;justify-content:center;gap:8px;margin-bottom:18px;min-height:50px}
.id-display span{min-width:38px;height:50px;padding:0 6px;border-radius:12px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:25px;font-weight:700;font-variant-numeric:tabular-nums}
.id-display .ph2{background:none;opacity:.4;font-size:22px;letter-spacing:4px}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:18px;min-height:18px}
.pin-dots span{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.45);transition:.15s}
.pin-dots span.on{background:#fff;border-color:#fff;transform:scale(1.12)}
.login-err{text-align:center;color:#fca5a5;font-size:12.5px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;justify-items:center}
.kbtn{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.13);color:#fff;font-size:24px;font-weight:600;display:grid;place-items:center;border:1px solid rgba(255,255,255,.1)}
.kbtn:active{transform:scale(.92);background:rgba(255,255,255,.24)}
.kbtn.ghost{background:rgba(255,255,255,.05);font-size:21px;opacity:.85}
.kbtn.go{background:linear-gradient(135deg,#3b82f6,#2563eb);border-color:transparent;box-shadow:0 6px 16px rgba(37,99,235,.45)}
.login-back{width:100%;margin-top:14px;background:none;color:rgba(255,255,255,.7);font-size:12.5px;font-weight:600;padding:6px}
.login-foot{pointer-events:none;position:absolute;bottom:16px;font-size:11px;opacity:.5;z-index:1;display:flex;align-items:center;gap:5px}
.login-card.busy{opacity:.7;pointer-events:none}
.login-note{margin-top:14px;font-size:11.5px;opacity:.55;text-align:center;color:#fff}

/* Header */
.hdr{background:var(--grad);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px}
.hdr .av{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:22px}
.hdr b{font-size:16px;display:block} .hdr span{font-size:12px;opacity:.75}
.hdr .out{margin-left:8px;background:rgba(255,255,255,.14);color:#fff;padding:8px 12px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:6px}
.langtog{display:inline-flex;gap:2px;background:rgba(0,0,0,.06);border-radius:9px;padding:2px}
.langtog button{background:none;font-size:11px;font-weight:800;letter-spacing:.4px;color:var(--muted);padding:5px 9px;border-radius:7px;cursor:pointer}
.langtog button.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.hdr .langtog{margin-left:auto;background:rgba(255,255,255,.16)}
.hdr .langtog button{color:rgba(255,255,255,.7)}
.hdr .langtog button.on{background:rgba(255,255,255,.95);color:var(--navy)}
.login .langtog{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.12);z-index:6}
.login .langtog button{color:rgba(255,255,255,.72)}
.login .langtog button.on{background:rgba(255,255,255,.92);color:#12274d}

.body{flex:1;padding:18px;padding-bottom:90px;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 i{color:var(--accent);font-size:18px}

/* Clock face */
.clockface{position:relative;overflow:hidden;background:var(--grad);color:#fff;border-radius:20px;padding:28px 22px;text-align:center;margin-bottom:16px;box-shadow:0 14px 34px rgba(15,30,61,.30);border:1px solid rgba(255,255,255,.09)}
.clockface::before{content:'';position:absolute;top:-45%;right:-8%;width:58%;height:170%;background:radial-gradient(circle,rgba(96,165,250,.5),transparent 62%);pointer-events:none}
.clockface::after{content:'';position:absolute;bottom:-55%;left:-10%;width:52%;height:160%;background:radial-gradient(circle,rgba(37,99,235,.30),transparent 60%);pointer-events:none}
.clockface>*{position:relative;z-index:1}
.clockface .time{font-size:52px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;line-height:1}
.clockface .ampm{font-size:20px;opacity:.8}
.clockface .date{opacity:.8;margin-top:6px;font-size:13px}
.clockface .status{margin-top:16px;display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:22px;background:rgba(255,255,255,.16);font-size:14px;font-weight:600}
.status .pt{width:9px;height:9px;border-radius:50%;background:#fff}
.status.in .pt{background:#4ade80} .status.meal .pt,.status.break .pt{background:#fbbf24}

.punchgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pbtn{padding:18px 12px;border-radius:14px;font-weight:600;font-size:15px;display:flex;flex-direction:column;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);color:var(--navy)}
.pbtn i{font-size:26px}
.pbtn:disabled{opacity:.35}
.pbtn.go{background:var(--ok);border-color:var(--ok);color:#fff} .pbtn.go:disabled{background:#fff;border-color:var(--line);color:var(--navy)}
.pbtn.stop{background:var(--bad);border-color:var(--bad);color:#fff} .pbtn.stop:disabled{background:#fff;border-color:var(--line);color:var(--navy)}
.pbtn:active:not(:disabled){transform:scale(.97)}

.bio{background:var(--warnbg);color:#92600a;border-radius:12px;padding:14px;font-size:13.5px;display:flex;gap:10px;align-items:flex-start;margin-bottom:16px}
.bio i{font-size:20px;margin-top:1px}
.gate{margin-top:12px;text-align:center;font-size:13.5px;color:var(--warn);font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;min-height:20px}
.compnote{margin-top:6px;text-align:center;font-size:12.5px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px}
.gate i{font-size:17px}

.plist{list-style:none} .plist li{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
.plist li:first-child{border-top:none}
.plist .tt{font-variant-numeric:tabular-nums;font-weight:600;width:78px}
.plist .src{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:.4px;background:#eef1f7;color:var(--muted);padding:2px 7px;border-radius:5px}
.plist .src.web{background:#eef2ff;color:#4338ca}
.empty{text-align:center;color:var(--muted);padding:26px 0;font-size:14px}

/* Timecard */
.totals{display:flex;gap:8px;margin-bottom:14px}
.tc{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.tc span{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block}
.tc b{font-size:20px;font-variant-numeric:tabular-nums}
.tc.tot{background:var(--navy);color:#fff} .tc.tot span{color:rgba(255,255,255,.7)}
.periodsel{display:flex;gap:8px;margin-bottom:14px}
.periodsel button{flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--muted)}
.periodsel button.on{background:var(--navy);color:#fff;border-color:var(--navy)}

.dayblk{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.dayhd{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f4f6fb;font-size:13px}
.dayhd b{color:var(--navy)} .dayhd .h{font-variant-numeric:tabular-nums;font-weight:700}
.segrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--line)}
.segrow .chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;background:#fff;color:transparent;font-size:15px}
.segrow .chk.on{background:var(--ok);border-color:var(--ok);color:#fff}
.segrow .io{flex:1;font-size:13.5px} .segrow .io .b{color:var(--muted);font-size:11.5px}
.segrow .sh{font-variant-numeric:tabular-nums;font-weight:600}
.flag{background:var(--badbg);color:var(--bad);font-size:12px;padding:8px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:7px}
.flag.prem{background:var(--okbg);color:#166534}
.apbar{display:flex;gap:8px;margin:6px 0 16px}
.apstat{flex:1;text-align:center;padding:9px;border-radius:10px;font-size:12px;font-weight:600;background:#eef1f7;color:var(--muted)}
.apstat.done{background:var(--okbg);color:var(--ok)}
.bigbtn{width:100%;padding:15px;border-radius:13px;background:var(--grad);color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.bigbtn.ghost{background:#eef1f7;color:var(--navy)}
.bigbtn:disabled{opacity:.5}

/* Alerts */
.alert{display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--line)}
.alert:first-child{border-top:none}
.alert .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:20px;flex-shrink:0}
.alert.warn .ic{background:var(--warnbg);color:var(--warn)} .alert.ok .ic{background:var(--okbg);color:var(--ok)} .alert.bad .ic{background:var(--badbg);color:var(--bad)}
.alert .msg{flex:1;font-size:14px;font-weight:500}
.alert .sub{font-size:12px;color:var(--muted);margin-top:2px}
.alert .ack{background:var(--ok);color:#fff;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-size:17px}

/* Requests / forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;background:#fbfcfe}
.reqcard{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:16px}
.pill.warn{background:var(--warnbg);color:var(--warn)} .pill.ok{background:var(--okbg);color:var(--ok)} .pill.neutral{background:#eef1f7;color:var(--muted)}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:#fff;border-top:1px solid var(--line);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:20}
.nav button{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;color:var(--muted);font-size:11px;font-weight:600;position:relative}
.nav button i{font-size:23px}
.nav button.on{color:var(--accent)}
.nav .nb{position:absolute;top:2px;right:22%;background:#f43f5e;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 4px}
.nav-brand{display:none}

/* ---- Desktop / wide layout: left sidebar nav + full-width main (auto-detected by width) ---- */
@media (min-width:900px){
  .app{max-width:none}
  .app.shell{display:grid;grid-template-columns:288px 1fr;grid-template-rows:auto 1fr;grid-template-areas:"side head" "side body";min-height:100dvh}
  .hdr{grid-area:head;padding:20px 30px}
  .hdr .av{width:46px;height:46px;font-size:24px}
  .hdr b{font-size:18px}
  .body{grid-area:body;padding:36px 40px 48px;display:flex;flex-direction:column;align-items:center}
  .body>*{width:100%;max-width:920px}
  .body.tab-timecard>*{max-width:1040px}
  .body.tab-timeoff>*{max-width:1320px}
  /* desktop polish: larger headings, cards, and rows across every tab */
  .body .ph{font-size:25px;margin-bottom:4px}
  .body .psub{font-size:15px;margin-bottom:22px}
  .body .card{padding:24px 26px}
  .body .tc{padding:16px} .body .tc b{font-size:24px}
  .body .alert{padding:16px 0} .body .alert .msg{font-size:15.5px} .body .alert .ic{width:44px;height:44px;font-size:23px}
  .body .reqcard{padding:16px 18px}
  .body .balcard{padding:18px 20px} .body .balrow b{font-size:19px}
  .body .segrow{padding:14px 16px;font-size:15px}
  /* Time Off: balances in a side column, big colorful calendar filling the main area (slim cells, no scroll) */
  .toff-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
  .toff-side .balgrid{grid-template-columns:1fr;gap:14px;margin-bottom:0}
  .tab-timeoff .cal-grid{gap:8px}
  .tab-timeoff .cal-day{aspect-ratio:auto;height:78px;align-items:flex-start;justify-items:flex-start;padding:9px 11px;font-size:15px;border-radius:12px}
  .tab-timeoff .cal-pad{aspect-ratio:auto;height:78px}
  .tab-timeoff .cal-wd div{font-size:11.5px}
  .tab-timeoff .cal-hd b{font-size:22px}
  .tab-timeoff .cal-hd button{width:42px;height:42px;font-size:21px}
  .nav{grid-area:side;position:static;transform:none;width:auto;max-width:none;height:100%;flex-direction:column;align-items:stretch;gap:6px;padding:22px 18px;border-top:none;border-right:1px solid var(--line);background:#fff}
  .nav-brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:18px;line-height:1.15;color:var(--navy);padding:6px 8px 20px;letter-spacing:.1px}
  .nav-brand i{width:44px;height:44px;border-radius:13px;background:var(--grad);color:#fff;display:grid;place-items:center;font-size:26px;box-shadow:0 6px 16px rgba(37,99,235,.3);flex-shrink:0}
  .nav button{flex:none;flex-direction:row;justify-content:flex-start;gap:16px;padding:16px 17px;font-size:17px;font-weight:700;border-radius:14px;color:var(--navy)}
  .nav button i{font-size:29px;color:var(--accent)}
  .nav button.on{color:#fff;background:var(--grad);box-shadow:0 8px 20px rgba(37,99,235,.30)}
  .nav button.on i{color:#fff}
  .nav button:hover:not(.on){background:#eef3ff}
  .nav .nb{position:static;margin-left:auto;top:auto;right:auto}
  .toast{left:auto;right:30px;bottom:30px;transform:translateY(10px)}
  .toast.show{transform:translateY(0)}
  /* clock view uses the width: clock + buttons on the left, today's punches on the right */
  .body>.clockwrap{max-width:1120px}
  .clockwrap{display:grid;grid-template-columns:1fr .95fr;gap:26px;align-items:start}
  .clock-side{margin-top:0}
  .clockface{padding:30px 24px;border-radius:20px}
  .clockface .time{font-size:56px}
  .clockface .ampm{font-size:22px}
  .clockface .date{font-size:14px;margin-top:8px}
  .clockface .status{font-size:14px;padding:8px 16px;margin-top:16px}
  .punchgrid{gap:13px}
  .pbtn{padding:22px 14px;border-radius:16px;font-size:16px;gap:10px}
  .pbtn i{font-size:27px}
  .clock-side .card{padding:20px 22px}
  .clock-side .card h2{font-size:15px;margin-bottom:14px}
  .plist li{padding:12px 0;font-size:15px}
  .plist .tt{width:88px;font-size:15px}
}
.clockwrap{width:100%}
.clock-side{margin-top:16px}
.occ-summary{display:flex;justify-content:space-between;align-items:center;gap:16px}
.occ-sm-lbl{font-size:12px;color:var(--muted);font-weight:600}
.occ-sm-val{font-size:28px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
.occ-sm-note{max-width:58%;text-align:right;font-size:11.5px;color:var(--muted)}
.occrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
.occrow:first-child{border-top:none}
.occ-lbl{font-weight:600;font-size:14px}
.occ-sub{font-size:12px;color:var(--muted);margin-top:2px}
.occ-pts{font-weight:800;color:var(--warn);font-variant-numeric:tabular-nums;font-size:15px;flex-shrink:0}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:40;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ph{font-size:20px;font-weight:700;margin-bottom:2px}
.psub{color:var(--muted);font-size:13px;margin-bottom:16px}

/* Calendar (time off) */
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-hd b{font-size:17px;color:var(--navy)}
.cal-hd button{background:#eff4fd;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;color:var(--accent)}
.cal-hd button:hover{background:#dbe7fc}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-wd{margin-bottom:8px}
.cal-wd div{text-align:center;font-size:10.5px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.cal-day{aspect-ratio:1;border-radius:12px;background:#eff4fd;font-size:15px;font-weight:700;color:var(--navy);display:grid;place-items:center;border:1.5px solid transparent;transition:.14s}
.cal-day:hover:not(:disabled){background:#dbe7fc;border-color:#bfd4f5}
.cal-day:active:not(:disabled){transform:scale(.94)}
.cal-day.past{opacity:.45;background:#f4f6fb;color:var(--muted)}
.cal-day.today{box-shadow:inset 0 0 0 2px var(--accent);background:#e0edff}
.cal-day.sel{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(37,99,235,.4)}
.cal-day.sel:hover{background:var(--grad);border-color:transparent}
.cal-pad{aspect-ratio:1}
.nav button{font-size:10px}

/* PTO / Sick balances */
.balgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.balcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.balhd{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:12px}
.balhd i{color:var(--accent);font-size:17px}
.balrow{display:flex;justify-content:space-between;text-align:center;margin-bottom:10px}

<script>
/* ============================================================
   SUPABASE — shared backend. When SUPA_URL/KEY are set and the
   client library loaded, Store.enabled is true and the app runs
   live. Otherwise every Store.* call is a no-op and the app runs
   on its in-memory seed (demo), so nothing breaks offline.
============================================================ */
const SUPA_URL      = "https://zozpomjvvrhjgqbazmrd.supabase.co";
const SUPA_ANON_KEY = "sb_publishable_sKcs24iSLfda4g7gvXJcAw_HlmuLsdf";

/* ---- server-time anchoring ----
   Punches and the on-screen clock use REAL (server) time, not the tablet's clock, so a drifted
   or tampered device clock can't produce wrong punches. TIME_OFFSET is the correction (ms) applied
   to the device clock; it stays 0 (device time) until the first successful sync, and on any failure. */
let TIME_OFFSET = 0;
function nowMs(){ return Date.now() + TIME_OFFSET; }
function nowDate(){ return new Date(nowMs()); }
async function syncServerTime(){
  try{
    const t0 = Date.now();
    const res = await fetch(`${SUPA_URL}/rest/v1/rpc/server_now`, {
      method:'POST', headers:{ apikey:SUPA_ANON_KEY, 'Content-Type':'application/json' }, body:'{}', cache:'no-store' });
    const t1 = Date.now();
    let serverMs = null;
    if(res.ok){ try{ const b=await res.json(); const ms=new Date(b).getTime(); if(ms) serverMs=ms; }catch(_){} }
    if(!serverMs){ const hdr=res.headers.get('date'); if(hdr){ const ms=new Date(hdr).getTime(); if(ms) serverMs=ms; } }
    if(serverMs){ TIME_OFFSET = serverMs - (t0 + (t1-t0)/2); }   // align to the request midpoint (accounts for latency)
  }catch(_){ /* offline → keep device time */ }
}
const Store = (() => {
  let sb = null;
  const enabled = !!(SUPA_URL && SUPA_ANON_KEY && window.supabase);
  if (enabled) sb = window.supabase.createClient(SUPA_URL, SUPA_ANON_KEY, {
    auth: { persistSession: false, autoRefreshToken: true }, // kiosk: always ask for ID+PIN, leave nothing behind
  });
  const inEmp  = r => ({ id:r.id, name:r.name, empId:r.emp_id, loc:r.state, dept:r.dept, tz:r.tz,
                         mgr:r.manager_id, role:r.role, rate:+r.rate||0, webPunch:r.web_punch, remote:r.remote,
                         pto:{allot:+r.pto_allot||0, used:+r.pto_used||0},
                         sick:{allot:+r.sick_allot||0, used:+r.sick_used||0} });
  const inPunch= r => ({ id:r.id, emp:r.employee_id, ts:r.ts, type:r.type, source:r.source });
  const inOcc  = r => ({ id:r.id, emp:r.employee_id, date:r.date, code:r.code, note:r.note, by:r.by_name, at:r.at });
  const inPto  = r => ({ id:r.id, emp:r.employee_id, type:r.type, days:r.days, note:r.note, status:r.status,
                         by:r.created_by, at:r.created_at, decidedBy:r.decided_by, decidedAt:r.decided_at });
  const inReq  = r => ({ id:r.id, emp:r.employee_id, weekKey:r.week_key, kind:r.kind,
                         proposed:{ymd:r.proposed_ymd, time:r.proposed_time, type:r.proposed_type},
                         note:r.note, status:r.status, by:r.created_by, at:r.created_at });
  const get = (t, map) => sb.from(t).select('*').then(r => {
  if (r.error) {
    console.warn('[load] ' + t + ' failed:', r.error.code, r.error.message);
    throw Object.assign(new Error('load_failed:' + t), { table: t, code: r.error.code });
  }
  return (r.data || []).map(map);
});
  return {
    enabled, client: () => sb,
    async pinLogin(empId, pin) {
      if (!enabled) return { ok:false, error:'offline' };
      const { data, error } = await sb.functions.invoke('pin-login', { body:{ empId, pin } });
      if (error || !data || data.error) return { ok:false, error:(data && data.error) || 'Sign-in failed' };
      const { error: vErr } = await sb.auth.verifyOtp({ email:data.email, token:data.otp, type:'email' });
      if (vErr) return { ok:false, error:'Sign-in failed' };
      return { ok:true };
    },
    async pinStatus(empId) {
      if (!enabled) return { exists:true, hasPin:true };
      const { data, error } = await sb.rpc('pin_status', { p_emp_id:String(empId) });
      if (error) return { error:error.message };
      return data || { exists:false };
    },
    async enrollPin(empId, pin) {
      if (!enabled) return { ok:false, error:'offline' };
      const { data, error } = await sb.rpc('enroll_pin', { p_emp_id:String(empId), p_pin:String(pin) });
      if (error) return { ok:false, error:error.message };
      return data || { ok:false, error:'Could not set PIN' };
    },
    async myEmployeeId() {
      if (!enabled) return null;
      const { data:{ user } } = await sb.auth.getUser();
      if (!user) return null;
      const { data } = await sb.from('employees').select('id').eq('auth_user_id', user.id).maybeSingle();
      return data ? data.id : null;
    },
    async session() { return enabled ? (await sb.auth.getSession()).data.session : null; },
    signOut() { return enabled ? sb.auth.signOut() : null; },
    async loadMine() {
      if (!enabled) return null;
      const [employees, punches, segAppr, punchReqs, ptoReqs, ack, occ] = await Promise.all([
        get('employees', inEmp), get('punches', inPunch),
        sb.from('seg_approvals').select('*'), get('punch_requests', inReq),
        get('pto_requests', inPto), sb.from('ack_alerts').select('*'),
        sb.from('occurrences').select('*'),
      ]);
      const segApprovals = {}; (segAppr.data||[]).forEach(r => segApprovals[`${r.in_punch_id}|${r.layer}`] = {by:r.by_name, at:r.at});
      const ackAlerts = {}; (ack.data||[]).forEach(r => ackAlerts[r.alert_key] = {by:r.by_name, at:r.at});
      const occurrences = occ.error ? [] : (occ.data||[]).map(inOcc);
      const locResp = await sb.from('punch_locations').select('*');
      const punchLocations = (locResp.error ? [] : (locResp.data||[]).map(r=>({id:r.id, name:r.name, lat:r.lat, lng:r.lng, radius:r.radius_m||200, active:r.active!==false})));
      return { employees, punches, segApprovals, requests:punchReqs, ptoRequests:ptoReqs, ackAlerts, punchLocations, occurrences };
    },
    addPunch(p)        { return enabled ? sb.from('punches').insert({id:p.id, employee_id:p.emp, ts:p.ts, type:p.type, source:p.source||'web', photo_url:p.photoUrl||null, lat:p.lat!=null?p.lat:null, lng:p.lng!=null?p.lng:null}) : null; },
    async uploadPunchPhoto(blob, path){ if(!enabled) return null;
      const { error } = await sb.storage.from('punch-photos').upload(path, blob, {contentType:'image/jpeg', upsert:true});
      if(error){ console.warn('photo upload failed:', error.message); return null; }
      return path; },
    setSegE(inId, empId, by) { return enabled ? sb.from('seg_approvals').upsert({in_punch_id:inId, layer:'E', employee_id:empId, by_name:by}, {onConflict:'in_punch_id,layer'}) : null; },
    clearSegE(inId)    { return enabled ? sb.from('seg_approvals').delete().match({in_punch_id:inId, layer:'E'}) : null; },
    addPunchRequest(r) { return enabled ? sb.from('punch_requests').insert({id:r.id, employee_id:r.emp, week_key:r.weekKey, kind:r.kind, proposed_ymd:r.proposed.ymd, proposed_time:r.proposed.time, proposed_type:r.proposed.type, note:r.note, status:'pending', created_by:r.by}) : null; },
    addPtoRequest(r)   { return enabled ? sb.from('pto_requests').insert({id:r.id, employee_id:r.emp, type:r.type, days:r.days, note:r.note, status:'pending', created_by:r.by}) : null; },
    ackAlert(empId, key, by) { return enabled ? sb.from('ack_alerts').upsert({employee_id:empId, alert_key:key, by_name:by}) : null; },
    subscribe(tables, onChange, onStatus) { if(!enabled) return null; const ch=sb.channel('wc-live'); tables.forEach(t=>ch.on('postgres_changes',{event:'*',schema:'public',table:t},onChange)); ch.subscribe(onStatus); return ch; },
    removeChannel(ch) { if(enabled && ch) sb.removeChannel(ch); },
  };
})();
// Supabase builders are lazy; ensure every write actually executes.
(function autofire(){
  if(!Store.enabled) return;
  ['addPunch','setSegE','clearSegE','addPunchRequest','addPtoRequest','ackAlert'].forEach(name=>{
    const orig=Store[name]; if(typeof orig!=='function') return;
    Store[name]=function(...args){ const b=orig.apply(Store,args);
      if(b && typeof b.then==='function'){ return b.then(r=>{ if(r&&r.error){ console.error(name+' failed:',r.error); try{toast('⚠ Not saved — '+(r.error.message||''));}catch(e){} } else { if(window.__hrPing) window.__hrPing(); } return r; }); }
      return b; };
  });
})();

/* ============================================================
   LIVE — Supabase realtime. When HR edits a punch, decides one of
   my requests, or approves my card in the Timekeeping Center, that
   change lands here instantly: we re-pull my snapshot via loadMine()
   and re-render — no hard refresh. RLS scopes realtime to my own
   rows, so I only get my own events. Debounced, deferred while I'm
   typing, and re-synced on (re)subscribe / tab re-focus.
============================================================ */
const Live = (() => {
  const TABLES = ['punches','punch_requests','pto_requests','seg_approvals','ack_alerts','employees'];
  let ch=null, bus=null, timer=null, pending=false, running=false;
  const fieldFocused = () => { const el=document.activeElement; return !!el && /^(INPUT|SELECT|TEXTAREA)$/.test(el.tagName); };
  function ping(){ if(bus){ try{ bus.send({type:'broadcast', event:'changed', payload:{}}); }catch(e){} } }
  async function sync(){
    if(!ME) return;
    const snap = await Store.loadMine();
    if(snap){ DB.employees=snap.employees; DB.punches=snap.punches; DB.segApprovals=snap.segApprovals;
              DB.requests=snap.requests; DB.ptoRequests=snap.ptoRequests; DB.ackAlerts=snap.ackAlerts; DB.occurrences=snap.occurrences||[]; }
    render();
  }
  async function run(){
    if(!pending || running) return;
    if(fieldFocused()){ schedule(600); return; }
    pending=false; running=true;
    try{ await sync(); }catch(e){ console.error('live sync failed', e); }
    finally{ running=false; if(pending) schedule(200); }
  }
  function schedule(ms){ pending=true; clearTimeout(timer); timer=setTimeout(run, ms||350); }
  return {
    async start(){
      if(!Store.enabled || ch) return;
      const sb=Store.client();
      // Feed the signed-in user's JWT to the realtime socket. Without it the
      // socket connects as anon and RLS silently drops every row event. Re-feed
      // on every auth change so the stream survives token refresh.
      async function pushAuth(){
        try{ const { data:{ session } }=await sb.auth.getSession();
          if(session && sb.realtime && sb.realtime.setAuth){ await sb.realtime.setAuth(session.access_token); return true; } }
        catch(e){ console.warn('[live] setAuth failed', e); }
        return false;
      }
      const authed = await pushAuth();
      console.log('[live] starting — authed socket:', authed);
      sb.auth.onAuthStateChange((_e, s)=>{ if(s && sb.realtime && sb.realtime.setAuth) sb.realtime.setAuth(s.access_token); });
      ch = Store.subscribe(TABLES,
        p=>{ console.log('[live] change', p.table, p.eventType); schedule(); },
        status=>{ console.log('[live] status', status); if(status==='SUBSCRIBED') schedule(); });
      // Broadcast bus — RLS-proof cross-app signal. A punch here pings the
      // shared channel; the Timekeeping Center re-syncs through its own
      // authenticated query, so no data rides on the wire.
      bus = sb.channel('hr-sync', { config:{ broadcast:{ self:false } } });
      bus.on('broadcast', { event:'changed' }, ()=>{ console.log('[live] ping'); schedule(); });
      bus.subscribe();
      window.__hrPing = ping;
      document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) schedule(); });
    },
    stop(){ if(ch){ Store.removeChannel(ch); ch=null; } if(bus){ Store.removeChannel(bus); bus=null; } window.__hrPing=null; clearTimeout(timer); pending=false; }
  };
})();

/* ============================================================
   DATA — in-memory for the demo. In production these are the
   SAME Supabase tables the Timekeeping Center reads/writes, so
   punches, approvals, requests and alerts sync between apps.
============================================================ */
const TZ={'America/Los_Angeles':'Pacific (CA)','America/New_York':'Eastern (PA)'};
const STATE_RULES={
  CA:{label:'California', daily:true, ot:8, dt:12, weekly:40, mealLaw:true},
  PA:{label:'Pennsylvania', daily:false, weekly:40, mealLaw:false}
};
function ruleFor(e){ return STATE_RULES[e.loc]||STATE_RULES.CA; }
const PAY_ANCHOR='2025-12-29';

const DB={
  employees:[
    {id:'e1', name:'Maria Sanchez',   empId:'735', loc:'CA', dept:'Production', tz:'America/Los_Angeles', webPunch:true, remote:true, pto:{allot:80,used:24},  sick:{allot:40,used:8}},
    {id:'e2', name:'David Cruz',       empId:'781', loc:'CA', dept:'Warehouse',  tz:'America/Los_Angeles', webPunch:false, remote:true, pto:{allot:80,used:40},  sick:{allot:40,used:16}},
    {id:'e3', name:'Karen Miller',     empId:'651', loc:'PA', dept:'Office',     tz:'America/New_York',    webPunch:true, remote:true, pto:{allot:120,used:32}, sick:{allot:40,used:0}},
    {id:'e4', name:'Adolfo Amaya',     empId:'037', loc:'CA', dept:'Production', tz:'America/Los_Angeles', webPunch:false, remote:true, pto:{allot:80,used:8},   sick:{allot:40,used:24}},
    {id:'e5', name:'Aileen Arguelles', empId:'112', loc:'PA', dept:'Office',     tz:'America/New_York',    webPunch:true, remote:false, pto:{allot:120,used:60}, sick:{allot:40,used:8}},
    {id:'e6', name:'Angel Coronel',    empId:'065', loc:'CA', dept:'Warehouse',  tz:'America/Los_Angeles', webPunch:false, remote:true, pto:{allot:80,used:16},  sick:{allot:40,used:0}},
    {id:'e7', name:'Bertha Flores',    empId:'078', loc:'PA', dept:'Office',     tz:'America/New_York',    webPunch:true, remote:true, pto:{allot:120,used:48}, sick:{allot:40,used:16}}
  ],
  punches:[],          // {id, emp, ts(UTC ISO), type, source}

  segApprovals:{},     // `${inPunchId}|E` -> {by,at}   (employee attestation)
  requests:[],         // {id, emp, weekKey, kind, proposed:{ymd,time,type}, note, status, by, at}

  ackAlerts:{},        // acknowledged alert keys
  occurrences:[],      // attendance occurrences assigned to me: {id, emp, date, code, note, by, at}
  pins:{'735':'1234','651':'2580'}  // empId -> 4-digit PIN (demo; hashed in Supabase later)
};
// attendance occurrence types (mirrors WS Time) — code -> label + points
const OCC_TYPES={
  CIE: {label:'Clock In Early (unapproved)', points:0.5},
  LE:  {label:'Leaving Early (unapproved)',  points:0.5},
  UA:  {label:'Unapproved Absence',          points:1},

/* seed a few days of punches for the current pay period (as if from the clock) */
(function seed(){
  const base=nowDate(); base.setHours(0,0,0,0); const day=86400000;
  function pk(emp,off,h,m,type,src){ const d=new Date(base.getTime()-off*day); d.setHours(h,m,0,0);
    return {id:'p'+Math.random().toString(36).slice(2,8), emp, ts:d.toISOString(), type, source:src||'web'}; }
  // Maria (e1, web): Mon-Wed clean, Thu short meal, Fri missing out
  const rows=[
    {o:4,r:[[8,1,'in'],[12,0,'meal_start'],[12,30,'meal_end'],[16,58,'out']]},
    {o:3,r:[[7,58,'in'],[12,0,'meal_start'],[12,30,'meal_end'],[16,45,'out']]},
    {o:2,r:[[8,3,'in'],[12,0,'meal_start'],[12,30,'meal_end'],[16,40,'out']]},
    {o:1,r:[[8,0,'in'],[12,0,'meal_start'],[12,18,'meal_end'],[16,45,'out']]},
    {o:0,r:[[8,5,'in'],[12,0,'meal_start'],[12,35,'meal_end']]}
  ];
  rows.forEach(d=>d.r.forEach(x=>DB.punches.push(pk('e1',d.o,x[0],x[1],x[2]))));
  // Karen (e3, web): clean days
  [4,3,2,1].forEach(o=>[[8,0,'in'],[12,0,'meal_start'],[12,30,'meal_end'],[16,30,'out']].forEach(x=>DB.punches.push(pk('e3',o,x[0],x[1],x[2]))));
})();

/* ============================================================
   TIME + TIMECARD ENGINE (matches the Timekeeping Center)
============================================================ */
function me(){ return DB.employees.find(e=>e.id===ME); }
function partsInTz(iso,tz){ const f=new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false,weekday:'short'}); const p={}; f.formatToParts(new Date(iso)).forEach(x=>p[x.type]=x.value); return {ymd:`${p.year}-${p.month}-${p.day}`,hh:+p.hour,mm:+p.minute,wd:p.weekday}; }
function fmtTime(iso,e){ return new Intl.DateTimeFormat('en-US',{timeZone:e.tz,hour:'numeric',minute:'2-digit',hour12:true}).format(new Date(iso)); }
function hhmm(iso,e){ const p=partsInTz(iso,e.tz); return `${String(p.hh).padStart(2,'0')}:${String(p.mm).padStart(2,'0')}`; }
function offsetMin(d,tz){ const f=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}); const p={}; f.formatToParts(d).forEach(x=>p[x.type]=x.value); return (Date.UTC(+p.year,+p.month-1,+p.day,+p.hour,+p.minute,+p.second)-d.getTime())/60000; }
function wallToUtc(ymd,hm,tz){ const [Y,M,D]=ymd.split('-').map(Number); const [h,m]=hm.split(':').map(Number); const g=new Date(Date.UTC(Y,M-1,D,h,m,0)); let o=offsetMin(g,tz); let u=new Date(g.getTime()-o*60000); const o2=offsetMin(u,tz); if(o2!==o)u=new Date(g.getTime()-o2*60000); return u.toISOString(); }
function ymdD(y){return new Date(y+'T00:00:00Z');}
function ymdAdd(y,n){return new Date(ymdD(y).getTime()+n*86400000).toISOString().slice(0,10);}
function weekStartOf(y){return ymdAdd(y,-((ymdD(y).getUTCDay()+6)%7));}
function todayYmd(e){return partsInTz(nowDate().toISOString(),e.tz).ymd;}
function weekKeyFor(iso,e){ const p=partsInTz(iso,e.tz); const local=new Date(p.ymd+'T00:00:00Z'); const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(p.wd); const mon=new Date(local.getTime()-((dow+6)%7)*86400000); return mon.toISOString().slice(0,10); }
function weekLabel(key){ const s=new Date(key+'T00:00:00Z'), e=new Date(s.getTime()+6*86400000); const f=d=>d.toLocaleDateString(LOCALE(),{month:'short',day:'numeric',timeZone:'UTC'}); return `${f(s)} – ${f(e)}`; }
function payPeriodStart(ymd){ const ms=Date.parse(ymd+'T00:00:00Z')-Date.parse(PAY_ANCHOR+'T00:00:00Z'); const n=Math.floor(ms/(14*86400000)); return new Date(Date.parse(PAY_ANCHOR+'T00:00:00Z')+n*14*86400000).toISOString().slice(0,10); }
function h2(n){ const h=Math.floor(n); const m=Math.round((n-h)*60); return `${h}:${String(m).padStart(2,'0')}`; }

function buildTimecard(empId,weekKey){
  const e=me(); const rule=ruleFor(e); const eToday=todayYmd(e);
  const wp=DB.punches.filter(p=>p.emp===empId && weekKeyFor(p.ts,e)===weekKey).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const byDay={}; wp.forEach(p=>{ const k=partsInTz(p.ts,e.tz).ymd; (byDay[k]=byDay[k]||[]).push(p); });
  const days=Object.keys(byDay).sort().map(ymd=>{
    const ps=byDay[ymd]; let worked=0,mealMin=0,exceptions=[],mealViol=false,inT=null,mealT=null,breakT=null;
    ps.forEach(p=>{ const t=new Date(p.ts).getTime();
      if(p.type==='in') inT=t;
      else if(p.type==='out'){ if(inT){worked+=t-inT;inT=null;} else exceptions.push('Out with no In'); }
      else if(p.type==='meal_start'){ mealT=t; if(inT){worked+=t-inT;inT=null;} }
      else if(p.type==='meal_end'){ if(mealT){mealMin+=(t-mealT)/60000; inT=t; mealT=null;} }
      else if(p.type==='break_start'){ breakT=t; if(inT){worked+=t-inT;inT=null;} }
      else if(p.type==='break_end'){ if(breakT){ const dur=(t-breakT)/60000; worked+=Math.min(dur,12)*60000; inT=t; breakT=null; } } });
    if(inT && ymd<eToday) exceptions.push('Missing out punch'); // open "in" on a past day = real missed punch; on today it just means still on the clock
    const hrs=worked/3600000;
    if(rule.mealLaw){ if(hrs>5&&mealMin===0){exceptions.push('No meal past 5th hour — premium');mealViol=true;}
      else if(mealMin>0&&mealMin<30){exceptions.push(`Short meal ${Math.round(mealMin)}m — premium`);mealViol=true;} }
    return {ymd,punches:ps,hrs,exceptions,mealViol};
  });
  let reg=0,ot=0,dt=0;
  if(rule.daily){ const worked=days.filter(d=>d.hrs>0); const seventh=worked.length>=7?worked[worked.length-1].ymd:null;
    days.forEach(d=>{ const h=d.hrs;
      if(d.ymd===seventh){ if(h>8){ot+=8;dt+=h-8;}else ot+=h; return; }
      if(h>rule.dt){dt+=h-rule.dt;ot+=rule.dt-rule.ot;reg+=rule.ot;} else if(h>rule.ot){ot+=h-rule.ot;reg+=rule.ot;} else reg+=h; });
    if(reg>rule.weekly){ot+=reg-rule.weekly;reg=rule.weekly;}
  } else { const total=days.reduce((s,d)=>s+d.hrs,0); reg=Math.min(total,rule.weekly); ot=Math.max(0,total-rule.weekly); }

function daySegments(punches){
  const segs=[]; let seg=null,pend=null;
  [...punches].sort((a,b)=>new Date(a.ts)-new Date(b.ts)).forEach(p=>{ const t=new Date(p.ts).getTime();
    if(p.type==='in'||p.type==='meal_end'||p.type==='break_end'){
      if(seg){ seg.issue='Missing out punch'; segs.push(seg); seg=null; }
      if(pend&&segs.length){const pr=segs[segs.length-1];pr.breakMin=(t-pend.t)/60000;pr.breakPaid=pend.paid;}
      const orphanResume = !pend && (p.type==='meal_end'||p.type==='break_end');
      pend=null; seg={inId:p.id,in:p.ts,out:null,hrs:0,breakMin:null,breakPaid:false};
      if(orphanResume) seg.issue=`Unmatched ${labelType(p.type)}`;
    }
    else if(p.type==='out'||p.type==='meal_start'||p.type==='break_start'){
      if(seg){seg.out=p.ts;seg.hrs=(t-new Date(seg.in).getTime())/3600000;segs.push(seg);seg=null;}
      else { segs.push({inId:p.id,in:p.ts,out:p.ts,hrs:0,breakMin:null,breakPaid:false,issue:`Unmatched ${labelType(p.type)}`}); }
      pend=p.type==='meal_start'?{t,paid:false}:p.type==='break_start'?{t,paid:true}:null; } });
  if(seg){ seg.issue=seg.issue||'Missing out punch'; segs.push(seg); } return segs;
}
function periodOf(e){ const t=todayYmd(e); return {start:payPeriodStart(t), stop:ymdAdd(payPeriodStart(t),13)}; }
function buildPeriod(empId,start,stop){ let reg=0,ot=0,dt=0,total=0; const weeks=[]; let cur=weekStartOf(start);
  while(cur<=stop){ const tc=buildTimecard(empId,cur); reg+=tc.reg;ot+=tc.ot;dt+=tc.dt;total+=tc.total; weeks.push(cur); cur=ymdAdd(cur,7); } return {reg,ot,dt,total,weeks}; }

/* segment (E) approval */
function segE(inId){ return !!DB.segApprovals[inId+'|E']; }
function chk(p,label){ if(p&&p.then) p.then(r=>{ if(r&&r.error){ console.error(label+' failed:',r.error); toast('⚠ '+label+' not saved — '+(r.error.message||'try again')); } }); return p; }
function toggleE(inId){ const k=inId+'|E';
  if(DB.segApprovals[k]){ delete DB.segApprovals[k]; chk(Store.clearSegE(inId),'Unapprove'); }
  else { DB.segApprovals[k]={by:me().name,at:nowDate().toISOString()}; chk(Store.setSegE(inId, ME, me().name),'Approve'); }
  render(); }
function weekSegIds(empId,weekKey){ const ids=[]; buildTimecard(empId,weekKey).days.forEach(d=>daySegments(d.punches).forEach(s=>ids.push(s.inId))); return ids; }
function approveAllE(){ const p=periodOf(me()); p.weeks=buildPeriod(me().id,p.start,p.stop).weeks;
  p.weeks.forEach(wk=>weekSegIds(me().id,wk).forEach(id=>{ DB.segApprovals[id+'|E']={by:me().name,at:nowDate().toISOString()}; chk(Store.setSegE(id, ME, me().name),'Approve'); }));

/* alerts (employee-facing) */
function alertKey(a){ return `${a.type}|${a.date}`; }
function myAlerts(){
  const e=me(); const {start,stop}=periodOf(e); const out=[]; let cur=start;
  while(cur<=stop && cur<=todayYmd(e)){
    const wk=weekKeyFor(cur+'T12:00:00Z',e); const d=buildTimecard(e.id,wk).days.find(x=>x.ymd===cur);
    if(d){ d.exceptions.forEach(x=>{ if(x.includes('Missing')||x.includes('no In')) out.push({type:'punch',date:cur,tone:'warn',ic:'ti-alarm',msg:t('al_missing',{date:mdl(cur)}),sub:t('al_missing_sub')}); });
      if(d.mealViol) out.push({type:'premium',date:cur,tone:'ok',ic:'ti-cash-banknote',msg:t('al_meal',{date:mdl(cur)}),sub:t('al_meal_sub')}); }

function mdl(ymd){ return ymdD(ymd).toLocaleDateString(LOCALE(),{weekday:'short',month:'short',day:'numeric',timeZone:'UTC'}); }

/* punch actions */
function empStatus(empId){ const e=DB.employees.find(x=>x.id===empId)||me(); if(!e) return 'out';
  const today=todayYmd(e);
  // live status reflects TODAY only — an unclosed punch from a prior day is a timecard exception, not a live state
  const last=DB.punches.filter(p=>p.emp===empId && partsInTz(p.ts,e.tz).ymd===today).sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  if(!last) return 'out'; if(['in','meal_end','break_end'].includes(last.type)) return 'in'; if(last.type==='meal_start') return 'meal'; if(last.type==='break_start') return 'break'; return 'out'; }
/* geofence + photo — on-site punch integrity (remote employees are unaffected) */
function geoDistM(lat1,lng1,lat2,lng2){ const R=6371000,toR=d=>d*Math.PI/180;
  const dLat=toR(lat2-lat1),dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(a))); }
function activeSites(){ return (DB.punchLocations||[]).filter(s=>s.active && s.lat!=null && s.lng!=null); }
function withinAnySite(lat,lng){ return activeSites().some(s=>geoDistM(lat,lng,s.lat,s.lng)<=(s.radius||200)); }
function getPosition(){ return new Promise(res=>{ if(!navigator.geolocation) return res(null);
  navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude}), ()=>res(null), {enableHighAccuracy:true,timeout:10000,maximumAge:0}); }); }
// grab a single still from the front camera, upload it, return the storage path (best-effort; never blocks the punch)
async function capturePunchPhoto(empIdNum, punchId){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return null;
  let stream=null;
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    const v=document.createElement('video'); v.playsInline=true; v.muted=true; v.srcObject=stream;
    await v.play().catch(()=>{});
    await new Promise(r=>setTimeout(r,450));                 // let exposure settle
    const w=v.videoWidth||640, h=v.videoHeight||480;
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(v,0,0,w,h);
    const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',0.8));
    stream.getTracks().forEach(t=>t.stop());
    if(!blob) return null;
    return await Store.uploadPunchPhoto(blob, `${empIdNum||'unknown'}/${punchId}.jpg`);
  }catch(e){ if(stream) stream.getTracks().forEach(t=>t.stop()); console.warn('photo capture skipped:', e.message); return null; }
}

let PUNCHING=false;
async function punch(type){
  if(PUNCHING) return;
  // enforce minimums: 30-min meal, 10-min break
  if(type==='meal_end'||type==='break_end'){
    const last=DB.punches.filter(p=>p.emp===ME).sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
    if(last){ const isMeal=type==='meal_end'; const min=isMeal?30:10;
      const mins=(nowMs()-new Date(last.ts).getTime())/60000;
      if(mins<min){ toast(t(isMeal?'toast_meal_min':'toast_break_min',{min:min,x:Math.ceil(min-mins)})); return; } }
  }
  const e=me(); const onsite = !!(e && e.remote===false);
  const pid='p'+Date.now(); let lat=null, lng=null, photoUrl=null;

  if(onsite){
    PUNCHING=true;
    const sites=activeSites();
    if(sites.length){                                       // geofence only if HR has set up sites
      toast(t('toast_checkloc'));
      const loc=await getPosition();
      if(!loc){ PUNCHING=false; toast(t('toast_turnloc')); return; }
      if(!withinAnySite(loc.lat,loc.lng)){ PUNCHING=false; toast(t('toast_notsite')); return; }
      lat=+loc.lat.toFixed(6); lng=+loc.lng.toFixed(6);
    }
    toast(t('toast_photo'));
    photoUrl = await capturePunchPhoto(e.empId, pid);       // best-effort; null if camera unavailable
    PUNCHING=false;
  }

  const np={id:pid, emp:ME, ts:nowDate().toISOString(), type, source:'web', photoUrl, lat, lng};
  DB.punches.push(np);
  const r=Store.addPunch(np);
  if(r && r.then) r.then(res=>{ if(res && res.error){ console.error('Punch save failed:', res.error); toast('⚠ Not saved — '+(res.error.message||'try again')); } });
  if(onsite){   // shared terminal: confirm, then return to keypad for the next person
    toast(t('toast_recorded',{label:labelType(type),name:e.name.split(' ')[0]}));
    render();
    setTimeout(()=>signOut(), 1700);
    return;
  }
  toast(t('toast_punched',{label:labelType(type)})); render();
}
function labelType(x){ return t('lt_'+x) !== ('lt_'+x) ? t('lt_'+x) : x; }

/* ---------- launch hook / future SSO ----------
   When the HRIS opens this app in a tab, the employee is already
   authenticated (company-email login) — so we sign them in and skip
   the keypad. Until Supabase is wired, a deep link ?emp=<ID> (or
   ?eid=<internal>) does the same, so the clock can be launched directly.
   Opened via the plain link with no param -> falls back to ID + PIN.  */
function bootstrapAuth(){
  try{
    const q=new URLSearchParams(location.search);
    const token=q.get('token');          // TODO(Supabase): verify signed HRIS/session token
    const byEmp=q.get('emp');             // e.g. ?emp=735  (employee ID number)

function kp(d){ const L=LOGIN; if(L.busy) return; L.err='';

  // pin / enroll / confirm all collect a 4-digit L.pin
  if(L.pin.length<4) L.pin+=d;

async function submitId(){ const L=LOGIN; if(!L.id){ L.err=t('err_enterid'); return render(); }
  L.empId=L.id; L.err='';

  if(st.hasPin){ L.step='pin'; L.pin=''; }          // returning: enter PIN

  L.busy=true; render();
  const res=await Store.enrollPin(L.empId, L.pin);
  if(!res.ok){ L.busy=false; L.err=res.error||t('err_generic'); L.pin=''; L.pin1=''; L.step='enroll'; return render(); }

  const app=document.getElementById('app'); if(clockTimer){clearInterval(clockTimer);clockTimer=null;}

  const e=me();

  app.innerHTML = `
    <div class="hdr"><div class="av"><i class="ti ti-user"></i></div>

function startClock(){
  const e=me();
  const tick=()=>{ const now=nowDate(); const tEl=document.getElementById('liveT'); if(!tEl){clearInterval(clockTimer);return;}
    const parts=new Intl.DateTimeFormat(LOCALE(),{timeZone:e.tz,hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}).formatToParts(now);
    const get=t=>parts.find(p=>p.type===t)?.value; tEl.innerHTML=`${get('hour')}:${get('minute')}:${get('second')} <span class="ampm">${get('dayPeriod')}</span>`;
    const dEl=document.getElementById('liveD'); if(dEl) dEl.textContent=new Intl.DateTimeFormat(LOCALE(),{timeZone:e.tz,weekday:'long',month:'long',day:'numeric'}).format(now);
    // min-time gate for meal (30) / break (10)
    const gEl=document.getElementById('gate'); if(!gEl) return;
    const todayK=todayYmd(e);
    const last=DB.punches.filter(p=>p.emp===e.id&&partsInTz(p.ts,e.tz).ymd===todayK).sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
    let msg='';
    if(last && (last.type==='break_start'||last.type==='meal_start')){
      const isMeal=last.type==='meal_start'; const min=isMeal?30:10;
      const remMs=min*60000-(nowMs()-new Date(last.ts).getTime());
      const btn=document.getElementById(isMeal?'endMealBtn':'endBreakBtn');
      if(remMs>0){ if(btn)btn.disabled=true; const rm=Math.floor(remMs/60000), rs=Math.floor((remMs%60000)/1000);
        msg=`<i class="ti ti-lock-clock"></i> ${t(isMeal?'gate_meal_min':'gate_break_min',{t:`<b>${rm}:${String(rs).padStart(2,'0')}</b>`})}`; }
      else { if(btn && e.webPunch) btn.disabled=false; msg=`<i class="ti ti-circle-check"></i> ${t(isMeal?'gate_meal_ok':'gate_break_ok')}`; }
    }
    gEl.innerHTML=msg;
  };
  tick(); clockTimer=setInterval(tick,1000);
}

function viewClock(){
  const e=me(); const st=empStatus(e.id);
  const sm={out:[t('st_out'),'out'],in:[t('st_in'),'in'],meal:[t('st_meal'),'meal'],break:[t('st_break'),'break']};
  const todayK=todayYmd(e); const today=DB.punches.filter(p=>p.emp===e.id&&partsInTz(p.ts,e.tz).ymd===todayK).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const canPunch=e.webPunch;
  const last=today[today.length-1];
  const sinceMin = last?(nowMs()-new Date(last.ts).getTime())/60000:0;
  const breakGate = st==='break' && sinceMin<10;   // 10-min minimum break
  const mealGate  = st==='meal'  && sinceMin<30;    // 30-min minimum meal
  // --- break/meal compliance: no back-to-back rest breaks (pattern is break→meal→break), and one meal unless a long shift earns a 2nd ---
  const meals = today.filter(p=>p.type==='meal_start').length;
  let lastMealIdx=-1; today.forEach((p,i)=>{ if(p.type==='meal_start') lastMealIdx=i; });
  const restInSeg = today.slice(lastMealIdx+1).some(p=>p.type==='break_start');   // rest break already taken since the last meal
  let workedMs=0, wIn=null; today.forEach(p=>{ const ts=new Date(p.ts).getTime();
    if(['in','meal_end','break_end'].includes(p.type)) wIn=ts;
    else if(['out','meal_start','break_start'].includes(p.type)){ if(wIn){workedMs+=ts-wIn;wIn=null;} } });
  if(wIn) workedMs += nowMs()-wIn;
  const maxMeals = (workedMs/3600000) >= 10 ? 2 : 1;    // CA-style 2nd meal only on 10h+ shifts
  const canStartMeal  = st==='in' && canPunch && meals < maxMeals;
  const canStartBreak = st==='in' && canPunch && !restInSeg;
  const compNotes=[]; if(st==='in'&&restInSeg) compNotes.push(t('gate_break_done')); if(st==='in'&&meals>=maxMeals) compNotes.push(t('gate_meal_done'));
  const btns=`<div class="punchgrid">
    <button class="pbtn go" onclick="punch('in')" ${st!=='out'||!canPunch?'disabled':''}><i class="ti ti-login-2"></i>${t('b_in')}</button>
    <button class="pbtn stop" onclick="punch('out')" ${st==='out'||!canPunch?'disabled':''}><i class="ti ti-logout-2"></i>${t('b_out')}</button>
    <button class="pbtn" onclick="punch('meal_start')" ${!canStartMeal?'disabled':''}><i class="ti ti-tools-kitchen-2"></i>${t('b_meal_start')}</button>
    <button class="pbtn" id="endMealBtn" onclick="punch('meal_end')" ${st!=='meal'||mealGate||!canPunch?'disabled':''}><i class="ti ti-arrow-back-up"></i>${t('b_meal_end')}</button>
    <button class="pbtn" onclick="punch('break_start')" ${!canStartBreak?'disabled':''}><i class="ti ti-coffee"></i>${t('b_break_start')}</button>
    <button class="pbtn" id="endBreakBtn" onclick="punch('break_end')" ${st!=='break'||breakGate||!canPunch?'disabled':''}><i class="ti ti-arrow-back-up"></i>${t('b_break_end')}</button>
  </div>
  <div class="gate" id="gate"></div>
  ${compNotes.length?`<div class="compnote"><i class="ti ti-info-circle"></i> ${compNotes.join(' · ')}</div>`:''}`;
  return `<div class="clockwrap">
    <div class="clock-main">
    <div class="clockface">
      <div class="time" id="liveT">–</div>
      <div class="date" id="liveD"></div>
      <div class="status ${sm[st][1]}"><span class="pt"></span> ${sm[st][0]}</div>
    </div>
    ${canPunch? btns : ''}
    </div>
    <div class="clock-side">
    <div class="card">
      <h2><i class="ti ti-list-details"></i> ${t('today_punches')}</h2>
      ${today.length?`<ul class="plist">${today.map(p=>`<li><span class="tt">${fmtTime(p.ts,e)}</span> ${labelType(p.type)} <span class="src ${p.source==='web'?'web':''}">${p.source==='web'?t('src_web'):t('src_clock')}</span></li>`).join('')}</ul>`:`<div class="empty">${t('no_punches')}</div>`}
    </div>
    </div>
  </div>`;
}

function viewTimecard(){
  const e=me(); const tdy=todayYmd(e);
  let start,stop;
  if(PERIOD==='this'){ start=payPeriodStart(tdy); stop=ymdAdd(start,13); }
  else { start=ymdAdd(payPeriodStart(tdy),-14); stop=ymdAdd(start,13); }
  const pd=buildPeriod(e.id,start,stop);
  const ids=pd.weeks.flatMap(wk=>weekSegIds(e.id,wk));
  const eDone=ids.length>0&&ids.every(segE);

  let blocks='';
  pd.weeks.forEach(wk=>{ const tc=buildTimecard(e.id,wk);
    tc.days.forEach(d=>{ const segs=daySegments(d.punches); if(!segs.length) return;
      const dt=ymdD(d.ymd); const wd=dt.toLocaleDateString(LOCALE(),{weekday:'short',month:'short',day:'numeric',timeZone:'UTC'});
      const shift=segs.reduce((s,x)=>s+x.hrs,0);
      blocks+=`<div class="dayblk"><div class="dayhd"><b>${wd}</b><span class="h">${h2(shift)} ${t('hrs')}</span></div>
        ${segs.map(s=>`<div class="segrow" onclick="toggleE('${s.inId}')">
          <div class="chk ${segE(s.inId)?'on':''}"><i class="ti ti-check"></i></div>
          <div class="io">${s.issue&&s.out===s.in?`<span style="color:var(--bad)"><i class="ti ti-alert-triangle"></i> ${s.issue}</span>`:`${fmtTime(s.in,e)} → ${s.out?fmtTime(s.out,e):`<span style="color:var(--bad)">${t('missing')}</span>`}`}${s.issue&&s.out!==s.in?` <i class="ti ti-alert-triangle" style="color:var(--bad)" title="${s.issue}"></i>`:''}${s.breakMin!=null?`<div class="b">${s.breakPaid?(s.breakMin<=12?t('br_paid',{n:Math.round(s.breakMin)}):t('br_split',{n:Math.round(s.breakMin),x:Math.round(s.breakMin-12)})):t('br_meal',{n:Math.round(s.breakMin)})}</div>`:''}</div>
          <div class="sh">${s.out?h2(s.hrs):'—'}</div></div>`).join('')}
        ${d.exceptions.map(x=>`<div class="flag ${x.includes('premium')?'prem':''}"><i class="ti ti-${x.includes('premium')?'cash-banknote':'alert-triangle'}"></i> ${x}</div>`).join('')}
      </div>`;
    });
  });

  return `
    <div class="ph">${t('tc_title')}</div><div class="psub">${weekLabel(start)} – ${weekLabel(ymdAdd(stop,-6))}</div>
    <div class="periodsel"><button class="${PERIOD==='this'?'on':''}" onclick="PERIOD='this';render()">${t('pp_this')}</button><button class="${PERIOD==='last'?'on':''}" onclick="PERIOD='last';render()">${t('pp_last')}</button></div>
    <div class="totals"><div class="tc"><span>${t('tc_regular')}</span><b>${h2(pd.reg)}</b></div><div class="tc"><span>${t('tc_ot')}</span><b>${h2(pd.ot+pd.dt)}</b></div><div class="tc tot"><span>${t('tc_total')}</span><b>${h2(pd.total)}</b></div></div>
    ${blocks||`<div class="card"><div class="empty">${t('tc_none')}</div></div>`}
    ${ids.length?`<div class="apbar"><div class="apstat ${eDone?'done':''}">${t('ap_you')} ${eDone?'✓':'⋯'}</div><div class="apstat">${t('ap_mgr')} ⋯</div><div class="apstat">${t('ap_hr')} ⋯</div></div>
    <button class="bigbtn ${eDone?'ghost':''}" onclick="${eDone?'':`approveAllE()`}" ${eDone?'disabled':''}><i class="ti ti-${eDone?'circle-check':'checks'}"></i> ${eDone?t('tc_approved'):t('tc_approve')}</button>
    <div class="psub" style="margin-top:12px;text-align:center">${t('tc_help')}</div>`:''}`;
}

function fmt12(hm){ if(!hm||!hm.includes(':'))return hm; let[h,m]=hm.split(':').map(Number); const ap=h<12?'AM':'PM'; h=h%12||12; return `${h}:${String(m).padStart(2,'0')} ${ap}`; }
function submitReq(){
  const e=me(); if(!REQ.note.trim()){ toast(t('toast_note')); return; }
  const req={id:'r'+Date.now(), emp:e.id, weekKey:weekKeyFor(REQ.ymd+'T12:00:00Z',e), kind:REQ.kind, proposed:{ymd:REQ.ymd,time:REQ.time,type:REQ.type}, note:REQ.note.trim(), status:'pending', by:e.name, at:nowDate().toISOString()};

  toast(t('toast_req_sent')); render();
}

/* ---------- TIME OFF (PTO) ---------- */
const HRS_PER_DAY=8;
function committedHrs(empId,type){ return DB.ptoRequests.filter(r=>r.emp===empId && r.type===type && (r.status==='pending'||r.status==='approved')).reduce((s,r)=>s+(r.days||[]).reduce((a,d)=>a+d.hours,0),0); }
function balance(e,key){ const b=e[key]||{allot:0,used:0}; const committed=committedHrs(e.id, key==='pto'?'PTO':'Sick'); return {allot:b.allot, used:b.used, committed, available:Math.max(0,b.allot-b.used-committed)}; }
function balCard(label,icon,b){
  const pc=v=>b.allot?Math.min(100,Math.max(0,v/b.allot*100)):0;
  return `<div class="balcard"><div class="balhd"><i class="ti ${icon}"></i> ${label}</div>
    <div class="balrow"><div><span>${t('bal_used')}</span><b>${b.used}h</b></div><div><span>${t('bal_committed')}</span><b>${b.committed}h</b></div><div class="av"><span>${t('bal_available')}</span><b>${b.available}h</b></div></div>
    <div class="balbar"><div class="seg used" style="width:${pc(b.used)}%"></div><div class="seg comm" style="width:${pc(b.committed)}%"></div></div>
    <div class="balfoot">${t('bal_foot',{a:b.available,b:b.allot,d:(b.available/HRS_PER_DAY).toFixed(1)})}</div></div>`;
}
let PTO={month:null, selected:{}, type:'PTO', note:''};
function initPTO(){ PTO.month=todayYmd(me()).slice(0,7); }
function ptoMonthShift(n){ const [y,m]=PTO.month.split('-').map(Number); PTO.month=new Date(Date.UTC(y,m-1+n,1)).toISOString().slice(0,7); render(); }
function ptoToggle(ymd){ if(PTO.selected[ymd]!=null) delete PTO.selected[ymd]; else PTO.selected[ymd]=8; render(); }
function setDayHours(ymd,h){ PTO.selected[ymd]=h; render(); }
function ptoDays(){ return Object.keys(PTO.selected).sort(); }
function ptoTotal(){ return ptoDays().reduce((s,d)=>s+PTO.selected[d],0); }
function submitPTO(){ const days=ptoDays(); if(!days.length){ toast(t('toast_selectday')); return; }
  const avail=balance(me(), PTO.type==='Sick'?'sick':'pto').available;
  if(PTO.type!=='Unpaid' && ptoTotal()>avail){ toast(t('toast_only_avail',{a:avail,type:PTO.type})); return; }
  const req={id:'pto'+Date.now(), emp:ME, days:days.map(ymd=>({ymd,hours:PTO.selected[ymd]})), type:PTO.type, note:PTO.note.trim(), status:'pending', by:me().name, at:nowDate().toISOString()};
  DB.ptoRequests.push(req); chk(Store.addPtoRequest(req),'Time-off request');
  PTO.selected={}; PTO.note=''; toast(t('toast_to_sent')); render(); }

function viewTimeOff(){
  if(!PTO.month) initPTO();
  const e=me(); const [y,m]=PTO.month.split('-').map(Number);
  const first=new Date(Date.UTC(y,m-1,1)); const dim=new Date(Date.UTC(y,m,0)).getUTCDate();
  const startDow=(first.getUTCDay()+6)%7; const today=todayYmd(e);
  let cells=''; for(let i=0;i<startDow;i++) cells+=`<div class="cal-pad"></div>`;
  for(let d=1;d<=dim;d++){ const ymd=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const past=ymd<today; const sel=PTO.selected[ymd]!=null; const isToday=ymd===today;
    cells+=`<button class="cal-day ${sel?'sel':''} ${past?'past':''} ${isToday?'today':''}" ${past?'disabled':`onclick="ptoToggle('${ymd}')"`}>${d}</button>`; }
  const monthName=first.toLocaleDateString(LOCALE(),{month:'long',year:'numeric',timeZone:'UTC'});
  const sel=ptoDays(); const total=ptoTotal();
  const mine=DB.ptoRequests.filter(r=>r.emp===ME).sort((a,b)=>new Date(b.at)-new Date(a.at));
  const hrOpts=ymd=>[1,2,3,4,5,6,7,8].map(h=>`<option value="${h}" ${PTO.selected[ymd]===h?'selected':''}>${h}h</option>`).join('');
  return `<div class="ph">${t('to_title')}</div><div class="psub">${t('to_sub')}</div>
    <div class="toff-grid">
    <div class="toff-side">
    <div class="balgrid">${balCard(t('bal_pto'),'ti-beach',balance(e,'pto'))}${balCard(t('bal_sick'),'ti-vaccine',balance(e,'sick'))}</div>
    </div>
    <div class="toff-main">
    <div class="card calcard">
      <div class="cal-hd"><button onclick="ptoMonthShift(-1)"><i class="ti ti-chevron-left"></i></button><b>${monthName}</b><button onclick="ptoMonthShift(1)"><i class="ti ti-chevron-right"></i></button></div>
      <div class="cal-grid cal-wd">${(LANG==='es'?['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']:['Mon','Tue','Wed','Thu','Fri','Sat','Sun']).map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    ${sel.length?`<div class="card">
      <div class="psub" style="margin:0 0 10px"><b>${t('to_across',{total:total,n:sel.length,dayword:(sel.length>1?t('word_days'):t('word_day'))})}</b></div>
      <div class="daylist">${sel.map(ymd=>`<div class="dayhrs"><span>${mdl(ymd)}</span><select onchange="setDayHours('${ymd}',+this.value)">${hrOpts(ymd)}</select></div>`).join('')}</div>
      <div class="field" style="margin-top:14px"><label>${t('to_type')}</label><select onchange="PTO.type=this.value">${['PTO','Sick','Unpaid'].map(x=>`<option value="${x}" ${PTO.type===x?'selected':''}>${x==='PTO'?t('bal_pto'):x==='Sick'?t('bal_sick'):(LANG==='es'?'Sin pago':'Unpaid')}</option>`).join('')}</select></div>
      <div class="field"><label>${t('to_note')}</label><input oninput="PTO.note=this.value" value="${(PTO.note||'').replace(/"/g,'&quot;')}" placeholder="${t('to_ph')}"></div>
      <button class="bigbtn" onclick="submitPTO()"><i class="ti ti-send"></i> ${t('to_request',{total:total})}</button>
    </div>`:`<div class="psub" style="text-align:center">${t('to_selecthint')}</div>`}
    ${mine.length?`<div class="card"><h2><i class="ti ti-history"></i> ${t('to_mine')}</h2>
      ${mine.map(r=>{const th=r.days.reduce((s,d)=>s+d.hours,0);return `<div class="reqcard"><div><b>${r.type} · ${th}h</b><div class="sub" style="font-size:12px;color:var(--muted)">${r.days.map(d=>`${mdl(d.ymd)} (${d.hours}h)`).join(', ')}${r.note?' · '+r.note:''}</div></div><span class="pill ${r.status==='pending'?'warn':r.status==='approved'?'ok':'neutral'}">${stLabel(r.status)}</span></div>`;}).join('')}</div>`:''}
    </div>
    </div>`;
}

async function boot(){
  syncServerTime();                             // anchor to server time (non-blocking); refresh periodically for a long-running kiosk
  setInterval(syncServerTime, 5*60*1000);
  if(Store.enabled){
    const session = await Store.session();     // HRIS-tab SSO: session already exists
    if(session){ await afterAuth(); return; }
    render();                                   // no session -> show keypad
    return;
  }
  bootstrapAuth();                              // offline demo (+ ?emp= deep link)
  render();
}
boot();
</script>
</body>
